# UI-only auto deploy on push; full stack: deploy-tma.yml
#
# Manual:
#   gh workflow run deploy-ui.yml
#   gh workflow run deploy-ui.yml -f ref=main
name: Deploy UI + Admin Console

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Branch to deploy (VM checks out origin/<ref>)
        required: false
        default: main
        type: string
  push:
    branches: [main]
    paths:
      - "admin-console/**"
      - "public/**"
      - "src/**"
      - "tailwind.config.ts"
      - "postcss.config.mjs"
      - "deploy/ui-deploy.sh"
      - "deploy/admin-console-build.sh"
      - ".github/workflows/deploy-ui.yml"

concurrency:
  group: deploy-tma-production
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      full_stack: ${{ steps.classify.outputs.full_stack }}
      ui_only: ${{ steps.classify.outputs.ui_only }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            full_stack:
              - 'indexer/**'
              - 'realtime/**'
              - 'db/**'
              - 'contracts/**'
              - 'scripts/**'
              - 'deploy/**'
              - '!deploy/ui-deploy.sh'
              - '!deploy/admin-console-build.sh'
              - 'package.json'
              - 'package-lock.json'
              - 'next.config.ts'
              - 'tsconfig.json'
              - 'ecosystem.config.cjs'
              - '.github/workflows/deploy-tma.yml'
              - 'src/app/api/**'
              - 'src/lib/**'
              - 'src/hooks/**'
              - 'src/config/**'
              - 'src/app/layout.tsx'
              - 'src/app/**/route.ts'
              - 'src/**'
              - '!admin-console/**'
              - '!public/**'
              - '!src/components/**'
              - '!src/app/globals.css'
              - '!src/app/admin/**'
              - '!src/app/**/page.tsx'
              - '!src/app/**/loading.tsx'
              - '!src/app/**/error.tsx'
              - '!src/app/**/opengraph-image.tsx'
              - '!src/app/**/*Client.tsx'
            ui_only:
              - 'admin-console/**'
              - 'public/**'
              - 'src/components/**'
              - 'src/app/globals.css'
              - 'src/app/admin/**'
              - 'src/app/**/page.tsx'
              - 'src/app/**/loading.tsx'
              - 'src/app/**/error.tsx'
              - 'src/app/**/opengraph-image.tsx'
              - 'src/app/**/*Client.tsx'
              - 'tailwind.config.ts'
              - 'postcss.config.mjs'
              - 'deploy/ui-deploy.sh'
              - 'deploy/admin-console-build.sh'
              - '.github/workflows/deploy-ui.yml'
      - id: classify
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "full_stack=false" >> "$GITHUB_OUTPUT"
            echo "ui_only=true" >> "$GITHUB_OUTPUT"
          else
            echo "full_stack=${{ steps.filter.outputs.full_stack }}" >> "$GITHUB_OUTPUT"
            echo "ui_only=${{ steps.filter.outputs.ui_only }}" >> "$GITHUB_OUTPUT"
          fi

  deploy-ui:
    needs: changes
    if: |
      github.event_name == 'workflow_dispatch' ||
      (needs.changes.outputs.full_stack != 'true' && needs.changes.outputs.ui_only == 'true')
    runs-on: ubuntu-latest
    steps:
      - name: Deploy UI over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: ${{ secrets.VM_SSH_PORT }}
          script_stop: true
          command_timeout: 15m
          script: |
            export GIT_REF="${{ github.event.inputs.ref || 'main' }}"
            cd /var/www/pump/tma
            chmod +x deploy/ui-deploy.sh
            ./deploy/ui-deploy.sh
