# Cloudflare → origin: forward HTTPS to Next.js (SIWE cookies + admin session).
# Include once in /etc/nginx/nginx.conf inside http { }:
#   include /etc/nginx/conf.d/pump-cloudflare-map.conf;
#
# Then use $pump_forwarded_proto instead of $scheme in proxy_set_header X-Forwarded-Proto.

map $http_cf_visitor $pump_forwarded_proto {
    default $scheme;
    ~*"scheme":"https"' https;
}
